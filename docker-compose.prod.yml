services:
  mysql:
    image: mysql:8.0
    container_name: keliu-mysql-prod
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-keliu123}
      MYSQL_DATABASE: keliudb
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-keliu123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - keliu-net

  redis:
    image: redis:7-alpine
    container_name: keliu-redis-prod
    expose:
      - "6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - keliu-net

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: keliu-es-prod
    expose:
      - "9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: always
    networks:
      - keliu-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keliu-backend-prod
    expose:
      - "8009"
    env_file:
      - ./backend/.env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: always
    networks:
      - keliu-net

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keliu-celery-prod
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env.prod
    depends_on:
      - backend
      - redis
    restart: always
    networks:
      - keliu-net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keliu-celery-beat-prod
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - ./backend/.env.prod
    depends_on:
      - backend
      - redis
    restart: always
    networks:
      - keliu-net

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keliu-nginx-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - keliu-net

volumes:
  mysql_data:
  redis_data:
  es_data:

networks:
  keliu-net:
    driver: bridge
